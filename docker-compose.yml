services:
  db:
    image: gvenzl/oracle-free:23-slim
    shm_size: 1gb
    environment:
      ORACLE_PASSWORD: secret
      APP_USER: ccgl
      APP_USER_PASSWORD: secret
    ports:
      - "1522:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - app-net

  app:
    build: .
    ports:
      - "8081:8080"
    environment:
      DB_URL: jdbc:oracle:thin:@db:1521/FREEPDB1
      DB_USER: ccgl
      DB_PASSWORD: secret
      JWT_SECRET: batata
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net

volumes:
  oracle-data:

networks:
  app-net:
    driver: bridge 